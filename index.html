<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Diary 💌</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Oswald:400,700&display=swap">
</head>
<body>
    <h1>Welcome to Digital Diary 💌!</h1>
    <style>
body {
    font-family: 'Oswald', sans-serif;
    background: #ffe8f2;
    text-align: center;
}
</style>
<form onsubmit="return false;">
    <label>Password 🔒:</label><br>
    <input type="password" id="password"><br><br>
    <p id="message"></p>
    <button onclick="checkPassword()">Unlock 🔓</button>
</form>
<script>
const password = "sleepover";

function checkPassword() {
    let userInput = document.getElementById("password").value;
    let message = document.getElementById("message");
    let button = document.querySelector("button");
    if (userInput === password) {
        button.style.display = "none";
        document.getElementById("password").disabled = true;
        message.textContent = "Unlocked 🔓!";
        window.location.href = "diary.html";
    } else {
        message.textContent = "❌ Wrong 🚫 password! 👀";
        message.textContent = "Locked 🔒!";
    }
}
</script>
</body>
</html>
